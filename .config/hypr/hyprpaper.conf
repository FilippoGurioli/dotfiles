source = ~/.config/hypr/hyprvars.conf
source = ~/.config/themer/libs/autogen/my-theme.conf

wallpaper {
    monitor = eDP-1
    path = $wallpaper
    fit_mode = cover
}

wallpaper {
    monitor = DP-1
    path = $wallpaper
    fit_mode = cover
}

wallpaper {
    monitor = HDMI-A-1
    path = $wallpaper
    fit_mode = cover
}

splash = false
